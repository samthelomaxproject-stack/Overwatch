<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Overwatch - Tactical Operations Center</title>
    <style>
        :root {
            --primary: #1a3a5c;
            --secondary: #2d3748;
            --accent: #f6ad55;
            --success: #48bb78;
            --warning: #ed8936;
            --danger: #f56565;
            --background: #1a202c;
            --text: #e2e8f0;
        }
        
        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }
        
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
            background: var(--background);
            color: var(--text);
            min-height: 100vh;
        }
        
        .header {
            background: var(--primary);
            padding: 1rem;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border-bottom: 2px solid var(--accent);
        }
        
        .logo {
            font-size: 1.5rem;
            font-weight: bold;
            color: var(--accent);
        }
        
        .status {
            display: flex;
            gap: 1rem;
            align-items: center;
        }
        
        .status-indicator {
            display: flex;
            align-items: center;
            gap: 0.5rem;
            font-size: 0.875rem;
        }
        
        .dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: var(--success);
        }
        
        .dot.offline {
            background: var(--danger);
        }
        
        .container {
            display: flex;
            height: calc(100vh - 60px);
        }
        
        .sidebar {
            width: 200px;
            background: var(--secondary);
            padding: 1rem;
        }
        
        .nav-item {
            padding: 0.75rem;
            margin-bottom: 0.5rem;
            border-radius: 4px;
            cursor: pointer;
            transition: background 0.2s;
        }
        
        .nav-item:hover, .nav-item.active {
            background: var(--primary);
        }
        
        .main {
            flex: 1;
            padding: 1rem;
            overflow-y: auto;
        }
        
        .card {
            background: var(--secondary);
            padding: 1rem;
            border-radius: 8px;
            margin-bottom: 1rem;
        }
        
        .card h3 {
            color: var(--accent);
            margin-bottom: 0.5rem;
        }
        
        .btn {
            background: var(--accent);
            color: var(--background);
            border: none;
            padding: 0.5rem 1rem;
            border-radius: 4px;
            cursor: pointer;
            font-weight: bold;
        }
        
        .btn:hover {
            opacity: 0.9;
        }
    </style>
</head>
<body>
    <div class="header">
        <div class="logo">⚡ Overwatch</div>
        <div class="status">
            <div class="status-indicator">
                <span class="dot"></span>
                <span>Online</span>
            </div>
        </div>
    </div>
    
    <div class="container">
        <div class="sidebar">
            <div class="nav-item active">📡 Packets</div>
            <div class="nav-item">🗺️ Map</div>
            <div class="nav-item">👥 Squads</div>
            <div class="nav-item">🛰️ SATCOM</div>
            <div class="nav-item">📍 Zones</div>
            <div class="nav-item">🔌 ATAK</div>
            <div class="nav-item">⚙️ Settings</div>
        </div>
        
        <div class="main">
            <div class="card">
                <h3>Create Packet</h3>
                <p>Select packet type and fill in details</p>
                <br>
                <button class="btn">+ New Packet</button>
            </div>
            
            <div class="card">
                <h3>Recent Packets</h3>
                <p>No packets yet. Create your first packet above.</p>
            </div>
            
            <div class="card">
                <h3>Transport Status</h3>
                <p>Configure mesh transports in Settings</p>
            </div>
        </div>
    </div>
    
    <script>
        // Placeholder for future functionality
        console.log('Overwatch v0.1.0 loaded');
    </script>
</body>
</html>
